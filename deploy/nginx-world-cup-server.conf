server {
    listen 80;
    listen [::]:80;
    server_name worldcup.tellu.top;

    access_log /var/log/nginx/world-cup.access.log;
    error_log /var/log/nginx/world-cup.error.log warn;

    location = / {
        return 308 https://$host/world-cup/;
    }

    location = /world-cup {
        return 308 https://$host/world-cup/;
    }

    location ^~ /world-cup/ {
        proxy_pass http://127.0.0.1:3008/world-cup/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }
}
